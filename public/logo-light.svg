  <rect x="4" y="30" width="28" height="3.5" rx="1.75" fill="#C9A45A" opacity="0.62"/>
  <rect x="4" y="36" width="28" height="3.5" rx="1.75" fill="#C9A45A" opacity="0.32"/>
  <!-- Wordmark -->
